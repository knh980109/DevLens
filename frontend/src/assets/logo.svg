<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="36" height="36">
  <defs>
    <linearGradient id="gcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B870;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00965E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="44" height="44" rx="10" fill="url(#gcGrad)"/>
  <!-- Magnifier circle -->
  <circle cx="19" cy="19" r="9" fill="none" stroke="white" stroke-width="3"/>
  <!-- Magnifier handle -->
  <line x1="25.5" y1="25.5" x2="34" y2="34" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Inner highlight dot -->
  <circle cx="16" cy="15" r="2.5" fill="rgba(255,255,255,0.35)"/>
</svg>
